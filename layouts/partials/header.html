<div class="py-4 border-b border-slate-300 mb-4 lg:mb-8 print:hidden">
  <div class="flex mx-auto lg:w-4/5">
    <h1 class="flex mr-auto items-center">
      <img src="/images/lucas.jpg" class="mr-1 w-8 h-8 rounded-md">
      <a href="{{ .Site.BaseURL }}" class="font-extrabold text-2xl text-green-700">{{ .Site.Title }}</a>
    </h1>

    <nav class="flex items-center gap-3">
      {{ $currentPage := . }}
      {{ range .Site.Menus.main }}
        <a href="{{ .URL | absLangURL }}" class="hover:underline hover:text-green-900 {{ if $currentPage.IsMenuCurrent "main" . }} text-green-900 font-bold{{ end }}">{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
</div>
